<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Usage</title>
<link rel="stylesheet" href="/static/daisyui.css">
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js" defer></script>
<script>
function fmtResets() {
  var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.querySelectorAll('[data-resets-at]').forEach(function(el) {
    var d = new Date(el.dataset.resetsAt);
    if (isNaN(d)) return;
    var now = new Date();
    var sameDay = d.getFullYear() === now.getFullYear() &&
                  d.getMonth()    === now.getMonth()    &&
                  d.getDate()     === now.getDate();
    var opts = {hour: 'numeric'};
    if (!sameDay) { opts.month = 'short'; opts.day = 'numeric'; }
    if (d.getMinutes() !== 0) opts.minute = '2-digit';
    el.textContent = 'resets ' + new Intl.DateTimeFormat([], opts).format(d) + ' (' + tz + ')';
  });
}
document.addEventListener('DOMContentLoaded', fmtResets);
document.addEventListener('htmx:afterSettle', fmtResets);
</script>
</head>
<body>
<header class="topbar">
  <h1>Claude Usage</h1>
  <span class="muted">refreshes every 30s</span>
</header>
<main id="usage" hx-get="/partials/usage" hx-trigger="load delay:2s, every 30s" hx-swap="innerHTML">
{{template "usage.html" .}}
</main>
</body>
</html>
