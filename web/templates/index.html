<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Claude Usage</title>
<link rel="stylesheet" href="/static/daisyui.css">
<link rel="stylesheet" href="/static/app.css">
<script src="/static/htmx.min.js" defer></script>
<script src="/static/ws.js" defer></script>
<script src="/static/client-side-templates.js" defer></script>
<script src="/static/mustache.min.js" defer></script>
<script>
function formatResetsIn(target, now) {
  var diff = target - now;
  if (diff <= 0) return 'resetting…';
  var s = Math.floor(diff / 1000);
  var m = Math.floor(s / 60);
  var h = Math.floor(m / 60);
  var d = Math.floor(h / 24);

  if (d > 0) return d + 'd ' + (h % 24) + 'h';
  if (h > 0) return h + 'h ' + (m % 60).toString().padStart(2, '0') + 'm';
  if (m > 0) return m + 'm ' + (s % 60).toString().padStart(2, '0') + 's';
  return s + 's';
}
function tick() {
  var now = new Date();
  var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  document.querySelectorAll('[data-resets-at]').forEach(function(el) {
    var d = new Date(el.dataset.resetsAt);
    if (isNaN(d)) return;
    var sameDay = d.getFullYear() === now.getFullYear() &&
                  d.getMonth()    === now.getMonth()    &&
                  d.getDate()     === now.getDate();
    var opts = {hour: 'numeric', minute: '2-digit', second: '2-digit'};
    if (!sameDay) { opts.month = 'short'; opts.day = 'numeric'; }
    el.textContent = 'resets ' + new Intl.DateTimeFormat([], opts).format(d) + ' (' + tz + ')';

    var row = el.previousElementSibling;
    if (row && row.classList.contains('row')) {
      var resetSpan = row.querySelector('.reset');
      if (resetSpan) resetSpan.textContent = formatResetsIn(d, now);
    }
  });
}
document.addEventListener('DOMContentLoaded', tick);
document.addEventListener('htmx:wsAfterMessage', tick);
setInterval(tick, 1000);
</script>
</head>
<body>
<header class="topbar">
  <h1>Claude Usage</h1>
  <button class="btn btn-sm refresh-btn" hx-post="/api/refresh" hx-swap="none"
          hx-on:htmx:before-request="this.disabled=true;this.textContent='refreshing…'"
          hx-on:htmx:after-request="this.disabled=false;this.textContent='refresh'">refresh</button>
</header>
<div hx-ext="ws,client-side-templates"
     ws-connect="/ws"
     mustache-template="usage-tmpl">
  <div id="usage" class="muted" style="padding:1rem 1.5rem">connecting…</div>
</div>
<template id="usage-tmpl">
<div id="usage" class="cards">
{{#cards}}
<article class="card account-card">
  <div class="card-body">
    <h2 class="card-title">
      {{name}}
      {{#subType}}<span class="badge badge-primary badge-soft">{{subType}}</span>{{/subType}}
      {{#error}}<span class="badge badge-error" title="{{error}}">error</span>{{/error}}
    </h2>
    {{#pending}}
      {{#error}}<p class="muted">fetch failed: {{error}}</p>{{/error}}
      {{^error}}<p class="muted">waiting for first fetch…</p>{{/error}}
    {{/pending}}
    {{^pending}}
      {{#rows}}
      <div class="row" title="resets {{resetsAt}}">
        <span class="label">{{label}}</span>
        <progress class="progress {{class}}" value="{{value}}" max="100"></progress>
        <span class="pct">{{pct}}</span>
        <span class="muted reset">{{resetsIn}}</span>
      </div>
      <p class="muted row-resets" data-resets-at="{{resetsAtISO}}"></p>
      {{/rows}}
      {{#extra}}<p class="muted">{{extra}}</p>{{/extra}}
      <p class="muted">updated {{fetchedAt}}{{#error}} — showing last good data{{/error}}</p>
    {{/pending}}
  </div>
</article>
{{/cards}}
</div>
</template>
</body>
</html>
